---
- name: Resolve KWeaver runtime networking for service release
  ansible.builtin.include_role:
    name: internal/network_runtime

- name: Remove stale copied service chart directories
  ansible.builtin.file:
    path: "{{ remote_chart_root }}/{{ item.dest }}"
    state: absent
  loop:
    - src: api_gateway
      dest: api-gateway-service
    - src: auth
      dest: auth-service
    - src: conversation
      dest: conversation-service
    - src: core_agent
      dest: core-agent-service-real
    - src: web
      dest: agent-web
  loop_control:
    label: "{{ item.dest }}"

- name: Copy service charts from canonical deploy/helm source
  ansible.builtin.copy:
    src: "{{ deployment_chart_source_root }}/{{ item.src }}/"
    dest: "{{ remote_chart_root }}/{{ item.dest }}/"
    mode: "0644"
  loop:
    - src: api_gateway
      dest: api-gateway-service
    - src: auth
      dest: auth-service
    - src: conversation
      dest: conversation-service
    - src: core_agent
      dest: core-agent-service-real
    - src: web
      dest: agent-web
  loop_control:
    label: "{{ item.dest }}"

- name: Ensure application namespace exists
  ansible.builtin.command: "kubectl get namespace {{ deployment_namespace }}"
  register: deployment_ns
  changed_when: false
  failed_when: false

- name: Create application namespace
  ansible.builtin.command: "kubectl create namespace {{ deployment_namespace }}"
  when: deployment_ns.rc != 0

- name: Recover pending service Helm releases before upgrade
  ansible.builtin.shell: |
    set -euo pipefail
    release={{ item | quote }}
    ns={{ deployment_namespace | quote }}
    status="$(helm status "$release" -n "$ns" -o json 2>/dev/null | python3 -c 'import json,sys; print(json.load(sys.stdin).get("info",{}).get("status", ""))' || true)"
    case "$status" in
      pending-install|pending-upgrade|pending-rollback)
        revision="$(helm history "$release" -n "$ns" -o json | python3 -c 'import json,sys; hist=json.load(sys.stdin); deployed=[int(x.get("revision", 0)) for x in hist if x.get("status") == "deployed"]; print(max(deployed) if deployed else "")')"
        if [ -z "$revision" ]; then
          echo "Helm release $release is $status and has no deployed revision to roll back to." >&2
          exit 2
        fi
        helm rollback "$release" "$revision" -n "$ns" --wait --timeout {{ helm_wait_timeout | quote }}
        echo "__ROLLED_BACK__ $release $status $revision"
        ;;
    esac
  args:
    executable: /bin/bash
  register: service_helm_pending_recovery
  changed_when: "'__ROLLED_BACK__' in service_helm_pending_recovery.stdout"
  loop:
    - api-gateway-service
    - auth-service
    - "{{ core_agent_service.release_name }}"
    - conversation-service
    - agent-web
  loop_control:
    label: "{{ item }}"

- name: Resolve preset agents for core agent release
  ansible.builtin.set_fact:
    core_agent_preset_agents: >-
      {{
        (preset_agents | default({}))
        | combine({'backup': backup_agent_id}, recursive=True)
        | combine(({'recovery': recovery_agent_id} if (recovery_agent_id | default('') | length > 0) else {}), recursive=True)
      }}

- name: Resolve Foundation endpoint for Core Agent Service
  ansible.builtin.set_fact:
    core_agent_foundation_endpoint_effective: "{{ core_agent_service.foundation.endpoint | default(foundation.endpoint | default(''), true) }}"
    core_agent_foundation_ak_configured: "{{ core_agent_service.foundation.ak | default('', true) }}"
    core_agent_foundation_sk_configured: "{{ core_agent_service.foundation.sk | default('', true) }}"

- name: Prompt for Foundation CLI AK for Core Agent Service when needed
  ansible.builtin.pause:
    prompt: "Input Foundation CLI AK for Core Agent Service (output is hidden)"
    echo: false
  register: core_agent_foundation_ak_prompt
  no_log: true
  when:
    - core_agent_foundation_endpoint_effective | length > 0
    - core_agent_foundation_ak_configured | length == 0
    - core_agent_service.foundation.prompt_for_credentials | default(true) | bool

- name: Prompt for Foundation CLI SK for Core Agent Service when needed
  ansible.builtin.pause:
    prompt: "Input Foundation CLI SK for Core Agent Service (output is hidden)"
    echo: false
  register: core_agent_foundation_sk_prompt
  no_log: true
  when:
    - core_agent_foundation_endpoint_effective | length > 0
    - core_agent_foundation_sk_configured | length == 0
    - core_agent_service.foundation.prompt_for_credentials | default(true) | bool

- name: Resolve Foundation AK/SK for Core Agent Service
  ansible.builtin.set_fact:
    core_agent_foundation_ak_effective: "{{ core_agent_foundation_ak_configured or (core_agent_foundation_ak_prompt.user_input | default('')) }}"
    core_agent_foundation_sk_effective: "{{ core_agent_foundation_sk_configured or (core_agent_foundation_sk_prompt.user_input | default('')) }}"
  no_log: true

- name: Assert Foundation endpoint and AK/SK are ready for Core Agent Service
  ansible.builtin.assert:
    that:
      - core_agent_foundation_endpoint_effective | length > 0
      - core_agent_foundation_ak_effective | length > 0
      - core_agent_foundation_sk_effective | length > 0
    fail_msg: >-
      Core Agent Service requires Foundation endpoint/AK/SK before the 5 business
      services are released. Run after Foundation is installed, then export
      FOUNDATION_CLI_AK and FOUNDATION_CLI_SK or enter them at the hidden prompt.
    success_msg: "Foundation endpoint and AK/SK for Core Agent Service are ready."
  when:
    - foundation.enabled | default(true) | bool
    - foundation.mode | default('integrated') in ['integrated', 'separated', 'external']

- name: Render service values files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ generated_root }}/{{ item.dest }}"
    mode: "0600"
  loop:
    - src: api-gateway-values.yaml.j2
      dest: api-gateway-values.yaml
    - src: auth-service-values.yaml.j2
      dest: auth-service-values.yaml
    - src: conversation-service-values.yaml.j2
      dest: conversation-service-values.yaml
    - src: core-agent-real-values.yaml.j2
      dest: core-agent-real-values.yaml
    - src: agent-web-values.yaml.j2
      dest: agent-web-values.yaml
  loop_control:
    label: "{{ item.dest }}"

- name: Remove stale generic service releases
  ansible.builtin.command: "helm uninstall {{ item }} -n {{ deployment_namespace }}"
  register: stale_release_uninstall
  changed_when: stale_release_uninstall.rc == 0
  failed_when: false
  loop:
    - v9-services
    - web-service
  loop_control:
    label: "{{ item }}"

- name: Deploy API gateway service
  ansible.builtin.command:
    argv:
      - helm
      - upgrade
      - --install
      - api-gateway-service
      - "{{ remote_chart_root }}/api-gateway-service"
      - --namespace
      - "{{ deployment_namespace }}"
      - --create-namespace
      - --values
      - "{{ generated_root }}/api-gateway-values.yaml"
      - --wait
      - --timeout
      - "{{ helm_wait_timeout }}"

- name: Deploy auth service
  ansible.builtin.command:
    argv:
      - helm
      - upgrade
      - --install
      - auth-service
      - "{{ remote_chart_root }}/auth-service"
      - --namespace
      - "{{ deployment_namespace }}"
      - --create-namespace
      - --values
      - "{{ generated_root }}/auth-service-values.yaml"
      - --wait
      - --timeout
      - "{{ helm_wait_timeout }}"

- name: Deploy core agent service
  ansible.builtin.command:
    argv:
      - helm
      - upgrade
      - --install
      - "{{ core_agent_service.release_name }}"
      - "{{ remote_chart_root }}/core-agent-service-real"
      - --namespace
      - "{{ deployment_namespace }}"
      - --create-namespace
      - --values
      - "{{ generated_root }}/core-agent-real-values.yaml"
      - --wait
      - --timeout
      - "{{ helm_wait_timeout }}"

- name: Pre-create conversation service Secret for migration hook
  ansible.builtin.shell: |
    set -euo pipefail
    helm template conversation-service "{{ remote_chart_root }}/conversation-service" \
      --namespace "{{ deployment_namespace }}" \
      --values "{{ generated_root }}/conversation-service-values.yaml" \
      --show-only templates/secret.yaml \
      | kubectl apply -n "{{ deployment_namespace }}" -f -
  args:
    executable: /bin/bash
  no_log: true
  changed_when: true

- name: Deploy conversation service
  ansible.builtin.command:
    argv:
      - helm
      - upgrade
      - --install
      - conversation-service
      - "{{ remote_chart_root }}/conversation-service"
      - --namespace
      - "{{ deployment_namespace }}"
      - --create-namespace
      - --values
      - "{{ generated_root }}/conversation-service-values.yaml"
      - --wait
      - --timeout
      - "{{ helm_wait_timeout }}"

- name: Deploy agent web service
  ansible.builtin.command:
    argv:
      - helm
      - upgrade
      - --install
      - agent-web
      - "{{ remote_chart_root }}/agent-web"
      - --namespace
      - "{{ deployment_namespace }}"
      - --create-namespace
      - --values
      - "{{ generated_root }}/agent-web-values.yaml"
      - --wait
      - --timeout
      - "{{ helm_wait_timeout }}"
