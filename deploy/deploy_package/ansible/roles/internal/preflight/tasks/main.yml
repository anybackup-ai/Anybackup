---
- name: Set derived working paths
  ansible.builtin.set_fact:
    generated_root: "{{ generated_root | default(remote_deploy_root + '/generated') }}"
    remote_chart_root: "{{ remote_chart_root | default(remote_deploy_root + '/charts') }}"
    remote_smoke_root: "{{ remote_smoke_root | default(remote_deploy_root + '/scripts/smoke') }}"
    remote_sandbox_build_dir: "{{ remote_sandbox_build_dir | default(remote_deploy_root + '/sandbox-build') }}"
    artifacts_root: "{{ artifacts_root | default(remote_deploy_root + '/artifacts') }}"

- name: Assert deployment profile is supported
  ansible.builtin.assert:
    that:
      - deployment_profile in ["full", "kweaver-core-only", "agent-content-only"]
    fail_msg: "deployment_profile must be one of full, kweaver-core-only, or agent-content-only."

- name: Assert target host is Linux
  ansible.builtin.assert:
    that:
      - ansible_system == "Linux"
    fail_msg: "This deployment package only targets remote Linux hosts."

- name: Assert key configuration is present
  ansible.builtin.assert:
    that:
      - remote_deploy_root is defined
      - remote_source_root is defined
      - deployment_namespace is defined
      - v9_infra.namespace is defined
    fail_msg: "Missing required deployment variables. Check group_vars/all.yml and group_vars/secrets.yml."

- name: Validate business service schema
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.repo is defined
      - item.ref is defined
      - item.dockerfile is defined
      - item.image_tag is defined
      - item.containerPort is defined
      - item.servicePort is defined
    fail_msg: "Each v9_services item must define name/repo/ref/dockerfile/image_tag/containerPort/servicePort."
  loop: "{{ v9_services }}"
  loop_control:
    label: "{{ item.name }}"
  when: deployment_profile == "full"

- name: Validate core agent build schema
  ansible.builtin.assert:
    that:
      - core_agent_service.repo is defined
      - core_agent_service.ref is defined
      - core_agent_service.dockerfile is defined
      - core_agent_service.image_tag is defined
      - core_agent_service.kweaver.tokenSecretRef.name is defined
      - core_agent_service.kweaver.tokenSecretRef.key is defined
    fail_msg: "core_agent_service is missing required build or secret reference fields."
  when: deployment_profile == "full"

- name: Validate Foundation install schema
  ansible.builtin.assert:
    that:
      - foundation is defined
      - foundation.mode in ["integrated", "separated", "external"]
      - foundation.package_path is defined
      - foundation.install_root is defined
      - foundation.mode == "external" or (foundation.self_ip | default('') | length > 0)
    fail_msg: >-
      Foundation configuration is incomplete. For full deployments set
      foundation.self_ip, or pass ./install.sh --foundation-self-ip <foundation-private-ip>.
  when:
    - deployment_profile == "full"
    - foundation.enabled | default(true) | bool

- name: Build required remote command list for the selected profile
  ansible.builtin.set_fact:
    preflight_required_commands: >-
      {{
        ["kubectl", "helm", "git"]
        + (["docker", "tar", "kweaver"] if deployment_profile == "full" else [])
        + (["python3", "kweaver"] if deployment_profile == "agent-content-only" else [])
      }}

- name: Check remote command availability
  ansible.builtin.command: "which {{ item }}"
  register: preflight_command_check
  changed_when: false
  loop: "{{ preflight_required_commands }}"
  loop_control:
    label: "{{ item }}"

- name: Assert required remote commands exist
  ansible.builtin.assert:
    that:
      - item.rc == 0
    fail_msg: "Required command {{ item.item }} is missing on remote host."
  loop: "{{ preflight_command_check.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Detect cluster image import command
  ansible.builtin.shell: |
    set -euo pipefail
    if command -v k3s >/dev/null 2>&1; then
      echo "k3s ctr images import"
    elif command -v ctr >/dev/null 2>&1; then
      echo "ctr -n k8s.io images import"
    else
      exit 1
    fi
  register: image_import_command_detect
  changed_when: false

- name: Set cluster image import command
  ansible.builtin.set_fact:
    image_import_command: "{{ image_import_command_detect.stdout }}"

- name: Check remote local-path storage class exists
  ansible.builtin.command: "kubectl get storageclass {{ v9_infra.default_storage_class }}"
  register: preflight_storageclass_check
  changed_when: false

- name: Assert remote local-path storage class exists
  ansible.builtin.assert:
    that:
      - preflight_storageclass_check.rc == 0
    fail_msg: >-
      Required StorageClass {{ v9_infra.default_storage_class }} is missing on the remote host.
      Bootstrap the Kubernetes storage provisioner before running this release package.

- name: Ensure remote working directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ remote_deploy_root }}"
    - "{{ generated_root }}"
    - "{{ remote_chart_root }}"
    - "{{ remote_smoke_root }}"
    - "{{ remote_sandbox_build_dir }}"
    - "{{ artifacts_root }}"
    - "{{ remote_source_root }}"
    - "{{ kweaver_online.repo_dir | dirname }}"
    - "{{ kweaver.config_dir }}"

- name: Check local foundation-cli file exists
  ansible.builtin.stat:
    path: "{{ package_root }}/bin/foundation-cli"
  delegate_to: localhost
  become: false
  register: local_foundation_cli
  when: deployment_profile == "full"

- name: Assert local foundation-cli file exists
  ansible.builtin.assert:
    that:
      - local_foundation_cli.stat.exists
      - local_foundation_cli.stat.size | default(0) | int >= foundation_cli_min_bytes | int
    fail_msg: >-
      Missing or placeholder-sized {{ package_root }}/bin/foundation-cli.
      Build the Linux amd64 binary from E:\Code\Service\foundation_cli before packaging:
      PowerShell -ExecutionPolicy Bypass -File scripts/build-foundation-cli.ps1
  when: deployment_profile == "full"
