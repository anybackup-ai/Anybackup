---
- name: Resolve KWeaver CLI target host
  ansible.builtin.set_fact:
    kweaver_cli_effective_host: >-
      {{
        (kweaver_cli.host | default('', true))
        or (((ansible_host | default('')) not in ['', 'localhost', '127.0.0.1', '::1']) | ternary((ansible_host | default('')), ''))
        or (ansible_default_ipv4.address | default(''))
      }}

- name: Resolve KWeaver CLI target base URL
  ansible.builtin.set_fact:
    kweaver_cli_effective_base_url: >-
      {{
        (kweaver_cli.base_url | default('', true))
        or (
          (kweaver_cli.scheme | default('https'))
          ~ '://'
          ~ kweaver_cli_effective_host
          ~ ':'
          ~ ((kweaver_cli.port | default(ingress.managed_nodeport.https_node_port)) | string)
        )
      }}

- name: Assert KWeaver CLI target base URL is resolved
  ansible.builtin.assert:
    that:
      - kweaver_cli_effective_base_url | length > 0
      - "'124.174.9.249' not in kweaver_cli_effective_base_url"
    fail_msg: >-
      Unable to resolve a local KWeaver CLI base URL. Set kweaver_cli_base_url
      or ensure ansible_host points at the target node.

- name: Check KWeaver CLI command exists
  ansible.builtin.command: which kweaver
  register: kweaver_cli_command_check
  changed_when: false

- name: Inspect saved KWeaver CLI auth for local platform before login
  ansible.builtin.command:
    argv:
      - kweaver
      - auth
      - status
      - "{{ kweaver_cli_effective_base_url }}"
  register: kweaver_cli_target_status_before_login
  changed_when: false
  failed_when: false

- name: Resolve saved KWeaver CLI login usability
  ansible.builtin.set_fact:
    kweaver_cli_saved_login_usable: >-
      {{
        (kweaver_cli_target_status_before_login.rc | default(1)) == 0
        and ('No saved token' not in (kweaver_cli_target_status_before_login.stderr | default('')))
        and ('Authentication: none' not in (kweaver_cli_target_status_before_login.stdout | default('')))
        and ('Token status: expired' not in (kweaver_cli_target_status_before_login.stdout | default('')))
        and ('refresh failed' not in (kweaver_cli_target_status_before_login.stdout | default('')))
        and ('refresh failed' not in (kweaver_cli_target_status_before_login.stderr | default('')))
      }}

- name: Login to local KWeaver platform with current password when needed
  ansible.builtin.shell: |
    set -euo pipefail
    args=(auth login "{{ kweaver_cli_effective_base_url }}" -u "{{ kweaver_cli.username }}" -p "{{ kweaver_cli.password }}")
    {% if kweaver_cli.alias | default('', true) | length > 0 %}
    args+=(--alias "{{ kweaver_cli.alias }}")
    {% endif %}
    {% if kweaver_cli.http_signin | default(true) | bool %}
    args+=(--http-signin)
    {% endif %}
    {% if kweaver_cli.insecure | default(true) | bool %}
    args+=(--insecure)
    {% endif %}
    kweaver "${args[@]}"
  register: kweaver_cli_current_password_login
  no_log: true
  changed_when: kweaver_cli_current_password_login.rc == 0
  failed_when: false
  retries: "{{ kweaver_cli.login_retries | default(3) | int }}"
  delay: "{{ kweaver_cli.login_delay_seconds | default(10) | int }}"
  until: kweaver_cli_current_password_login.rc == 0
  when:
    - not (kweaver_cli_saved_login_usable | bool)
    - kweaver_cli.username | default('', true) | length > 0
    - kweaver_cli.password | default('', true) | length > 0

- name: Login to local KWeaver platform by rotating the initial password when needed
  ansible.builtin.shell: |
    set -euo pipefail
    args=(
      auth login "{{ kweaver_cli_effective_base_url }}"
      -u "{{ kweaver_cli.username }}"
      -p "{{ kweaver_cli.initial_password }}"
      --new-password "{{ (kweaver_cli.new_password | default('', true)) or kweaver_cli.password }}"
    )
    {% if kweaver_cli.alias | default('', true) | length > 0 %}
    args+=(--alias "{{ kweaver_cli.alias }}")
    {% endif %}
    {% if kweaver_cli.http_signin | default(true) | bool %}
    args+=(--http-signin)
    {% endif %}
    {% if kweaver_cli.insecure | default(true) | bool %}
    args+=(--insecure)
    {% endif %}
    kweaver "${args[@]}"
  register: kweaver_cli_initial_password_login
  no_log: true
  changed_when: kweaver_cli_initial_password_login.rc == 0
  failed_when: false
  retries: "{{ kweaver_cli.login_retries | default(3) | int }}"
  delay: "{{ kweaver_cli.login_delay_seconds | default(10) | int }}"
  until: kweaver_cli_initial_password_login.rc == 0
  when:
    - not (kweaver_cli_saved_login_usable | bool)
    - (kweaver_cli_current_password_login.rc | default(1)) != 0
    - kweaver_cli.username | default('', true) | length > 0
    - kweaver_cli.initial_password | default('', true) | length > 0
    - ((kweaver_cli.new_password | default('', true)) or (kweaver_cli.password | default('', true))) | length > 0

- name: Inspect saved KWeaver CLI auth for local platform
  ansible.builtin.command:
    argv:
      - kweaver
      - auth
      - status
      - "{{ kweaver_cli_effective_base_url }}"
  register: kweaver_cli_target_status
  changed_when: false
  failed_when: false

- name: Stop when local KWeaver platform has no usable login
  ansible.builtin.assert:
    that:
      - kweaver_cli_target_status.rc == 0
      - "'No saved token' not in (kweaver_cli_target_status.stderr | default(''))"
      - "'Authentication: none' not in (kweaver_cli_target_status.stdout | default(''))"
      - "'Token status: expired' not in (kweaver_cli_target_status.stdout | default(''))"
      - "'refresh failed' not in (kweaver_cli_target_status.stdout | default(''))"
      - "'refresh failed' not in (kweaver_cli_target_status.stderr | default(''))"
    fail_msg: >-
      KWeaver CLI is pointed at {{ kweaver_cli_effective_base_url }}, but no
      usable authenticated login exists for this platform. Provide
      kweaver_cli_username/kweaver_cli_password (and kweaver_cli_initial_password
      for a freshly installed platform that still requires initial password
      rotation) or run
      `kweaver auth login {{ kweaver_cli_effective_base_url }}` on the target host.
      Login attempt summary:
      saved_login_usable={{ kweaver_cli_saved_login_usable | default(false) }},
      current_password_login_rc={{ kweaver_cli_current_password_login.rc | default('not-run') }},
      initial_password_rotation_rc={{ kweaver_cli_initial_password_login.rc | default('not-run') }}.
  when: kweaver_cli.require_auth | default(true) | bool

- name: Switch KWeaver CLI current platform to local KWeaver
  ansible.builtin.command:
    argv:
      - kweaver
      - auth
      - use
      - "{{ (kweaver_cli.alias | default('', true)) or kweaver_cli_effective_base_url }}"
      - --global
  register: kweaver_cli_use
  changed_when: "'Current platform' in (kweaver_cli_use.stdout | default('')) or kweaver_cli_use.rc == 0"

- name: Read current KWeaver CLI auth status
  ansible.builtin.command:
    argv:
      - kweaver
      - auth
      - status
  register: kweaver_cli_current_status
  changed_when: false

- name: Assert KWeaver CLI current platform is local KWeaver
  ansible.builtin.assert:
    that:
      - kweaver_cli_effective_base_url in kweaver_cli_current_status.stdout
      - "'124.174.9.249' not in kweaver_cli_current_status.stdout"
      - "'Authentication: none' not in kweaver_cli_current_status.stdout"
    fail_msg: >-
      KWeaver CLI current platform is not the local KWeaver endpoint.
      Expected {{ kweaver_cli_effective_base_url }}. Current status:
      {{ kweaver_cli_current_status.stdout | default('') }}

- name: Wait for local KWeaver BKN API through CLI
  ansible.builtin.command:
    argv:
      - kweaver
      - bkn
      - list
      - -bd
      - "{{ kweaver_cli.business_domain | default('bd_public', true) }}"
  register: kweaver_cli_bkn_probe
  changed_when: false
  failed_when: false
  retries: "{{ kweaver_cli.bkn_api_retries | default(40) | int }}"
  delay: "{{ kweaver_cli.bkn_api_delay_seconds | default(15) | int }}"
  until: kweaver_cli_bkn_probe.rc == 0
  when: kweaver_cli.verify_bkn_api | default(true) | bool

- name: Assert local KWeaver BKN API is reachable through CLI
  ansible.builtin.assert:
    that:
      - kweaver_cli_bkn_probe.rc == 0
    fail_msg: >-
      KWeaver CLI is now targeting {{ kweaver_cli_effective_base_url }}, but
      the BKN API check failed. stderr={{ kweaver_cli_bkn_probe.stderr | default('') }}
  when: kweaver_cli.verify_bkn_api | default(true) | bool

- name: Print KWeaver CLI configuration summary
  ansible.builtin.debug:
    msg:
      - "KWeaver CLI platform: {{ kweaver_cli_effective_base_url }}"
      - "KWeaver CLI alias: {{ kweaver_cli.alias | default('') }}"
      - "KWeaver CLI BKN API verified: {{ kweaver_cli.verify_bkn_api | default(true) }}"
