keycloak:
  replicaCount: 1
  image:
    registry: anybackup-v9-cn-beijing.cr.volces.com/anybackup-ai
    repository: thirdparty/keycloak
    tag: 26.5.1
    pullPolicy: IfNotPresent

  startCommand:
    - /opt/keycloak/bin/kc.sh
    - start

  bootstrapAdmin:
    username: admin

  realm:
    name: master
    accessTokenLifespan: 1800

  database:
    vendor: postgres
    host: postgresql.example.internal
    port: 5432
    name: keycloak
    schema: public
    username: keycloak
    jdbcUrl: ""

  secrets:
    create: false
    name: auth-service-keycloak-secrets
    adminPasswordKey: admin-password
    databasePasswordKey: database-password
    adminPassword: ""
    databasePassword: ""

  http:
    enabled: true
    port: 8080
    managementPort: 9000
    relativePath: /api/auth_service/v1

  hostname:
    hostname: ""
    admin: ""
    strict: false
    backchannelDynamic: false

  proxy:
    headers: xforwarded

  features:
    enabled: []
    disabled:
      - admin
      - account

  health:
    enabled: true

  metrics:
    enabled: true

  transaction:
    xaEnabled: false

  extraEnv: []
  extraEnvFrom: []

  service:
    type: ClusterIP
    ports:
      http: 80
      management: 9000

  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: "1"
      memory: 1536Mi

  probes:
    startup:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 60
    readiness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 12
    liveness:
      enabled: true
      initialDelaySeconds: 60
      periodSeconds: 10
      failureThreshold: 6

ingressRoute:
  enabled: true
  ingressClass: traefik
  publicPriority: 120
  protectedPriority: 110
  protectedMiddlewares: []
  publicPathRegexes:
    - /realms/[^/]+/\.well-known/openid-configuration
    - /realms/[^/]+/protocol/openid-connect/token
    - /realms/[^/]+/protocol/openid-connect/token/introspect
    - /realms/[^/]+/protocol/openid-connect/certs
  protectedPathRegexes:
    - /realms/[^/]+/protocol/openid-connect/logout
    - /realms/[^/]+/protocol/openid-connect/userinfo
    - /admin/realms/[^/]+/users(/[^/]+(/(reset-password|reset-password-email|execute-actions-email|role-mappings/realm))?)?
    - /admin/realms/[^/]+/roles/[^/]+(/users)?
