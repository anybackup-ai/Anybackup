{{- if .Values.keycloak.realm.accessTokenLifespan }}
{{- $relativePath := trimSuffix "/" (.Values.keycloak.http.relativePath | default "") }}
{{- $realmName := .Values.keycloak.realm.name | default "master" }}
{{- $realmConfigImage := .Values.keycloak.realmConfig.image }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "auth-service.fullname" . }}-realm-config
  labels:
    {{- include "auth-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "auth-service.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: realm-config
    spec:
      restartPolicy: OnFailure
      containers:
        - name: realm-config
          image: "{{ $realmConfigImage.registry }}/{{ $realmConfigImage.repository }}:{{ $realmConfigImage.tag }}"
          imagePullPolicy: {{ $realmConfigImage.pullPolicy }}
          env:
            - name: KEYCLOAK_ADMIN_USERNAME
              value: {{ .Values.keycloak.bootstrapAdmin.username | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "auth-service.secretName" . }}
                  key: {{ .Values.keycloak.secrets.adminPasswordKey }}
            - name: KEYCLOAK_SERVER
              value: {{ printf "http://%s:%v%s" (include "auth-service.fullname" .) .Values.keycloak.service.ports.http $relativePath | quote }}
            - name: KEYCLOAK_REALM
              value: {{ $realmName | quote }}
            - name: ACCESS_TOKEN_LIFESPAN
              value: {{ .Values.keycloak.realm.accessTokenLifespan | quote }}
            - name: REALM_CONFIG_RETRIES
              value: {{ .Values.keycloak.realmConfig.retries | default 60 | quote }}
            - name: REALM_CONFIG_RETRY_SLEEP_SECONDS
              value: {{ .Values.keycloak.realmConfig.retrySleepSeconds | default 5 | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              python3 - <<'PY'
              import json
              import os
              import sys
              import time
              import urllib.error
              import urllib.parse
              import urllib.request

              server = os.environ["KEYCLOAK_SERVER"].rstrip("/")
              realm = os.environ["KEYCLOAK_REALM"]
              username = os.environ["KEYCLOAK_ADMIN_USERNAME"]
              password = os.environ["KEYCLOAK_ADMIN_PASSWORD"]
              access_token_lifespan = int(os.environ["ACCESS_TOKEN_LIFESPAN"])
              retries = int(os.environ.get("REALM_CONFIG_RETRIES", "60"))
              retry_sleep = int(os.environ.get("REALM_CONFIG_RETRY_SLEEP_SECONDS", "5"))

              forwarded_headers = {
                  "X-Forwarded-Proto": "https",
                  "X-Forwarded-Port": "443",
              }

              def url(path):
                  return f"{server}{path}"

              def request(method, target, data=None, headers=None):
                  request_headers = {}
                  request_headers.update(forwarded_headers)
                  if headers:
                      request_headers.update(headers)
                  req = urllib.request.Request(target, data=data, headers=request_headers, method=method)
                  try:
                      with urllib.request.urlopen(req, timeout=20) as response:
                          return response.read().decode("utf-8")
                  except urllib.error.HTTPError as exc:
                      body = exc.read().decode("utf-8", errors="replace")
                      raise RuntimeError(f"HTTP {exc.code} from {target}: {body}") from exc

              realm_path = urllib.parse.quote(realm, safe="")
              token_url = url(f"/realms/{realm_path}/protocol/openid-connect/token")
              token = None
              for attempt in range(1, retries + 1):
                  form = urllib.parse.urlencode({
                      "client_id": "admin-cli",
                      "grant_type": "password",
                      "username": username,
                      "password": password,
                  }).encode("utf-8")
                  try:
                      raw = request(
                          "POST",
                          token_url,
                          data=form,
                          headers={"Content-Type": "application/x-www-form-urlencoded"},
                      )
                      token = json.loads(raw)["access_token"]
                      break
                  except Exception as exc:
                      if attempt == retries:
                          raise
                      print(f"Keycloak admin login attempt {attempt}/{retries} failed: {exc}", file=sys.stderr)
                      time.sleep(retry_sleep)

              payload = json.dumps({"accessTokenLifespan": access_token_lifespan}).encode("utf-8")
              auth_headers = {
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              }
              request("PUT", url(f"/admin/realms/{realm_path}"), data=payload, headers=auth_headers)
              raw = request("GET", url(f"/admin/realms/{realm_path}"), headers={"Authorization": f"Bearer {token}"})
              state = json.loads(raw)
              print(json.dumps(
                  {
                      "realm": state.get("realm"),
                      "accessTokenLifespan": state.get("accessTokenLifespan"),
                  },
                  ensure_ascii=False,
              ))
              PY
{{- end }}
