apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "core-agent-service.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "core-agent-service.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "core-agent-service.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "core-agent-service.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- if .Values.secrets.create }}
      annotations:
        checksum/core-agent-secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "core-agent-service.serviceAccountName" . }}
      containers:
        - name: {{ include "core-agent-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "core_agent_service"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "core-agent-service.secretName" . }}
                  key: {{ .Values.secrets.databaseUrlKey }}
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "core-agent-service.secretName" . }}
                  key: {{ .Values.secrets.rabbitmqUrlKey }}
            - name: KWEAVER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "core-agent-service.secretName" . }}
                  key: {{ .Values.secrets.kweaverUsernameKey }}
                  optional: true
            - name: KWEAVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "core-agent-service.secretName" . }}
                  key: {{ .Values.secrets.kweaverPasswordKey }}
                  optional: true
            - name: KWEAVER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "core-agent-service.secretName" . }}
                  key: {{ .Values.secrets.kweaverTokenKey }}
                  optional: true
            - name: FOUNDATION_AK
              valueFrom:
                secretKeyRef:
                  name: {{ include "core-agent-service.secretName" . }}
                  key: {{ .Values.secrets.foundationAkKey }}
                  optional: true
            - name: FOUNDATION_SK
              valueFrom:
                secretKeyRef:
                  name: {{ include "core-agent-service.secretName" . }}
                  key: {{ .Values.secrets.foundationSkKey }}
                  optional: true
            - name: RABBITMQ_EXCHANGE
              value: {{ .Values.config.rabbitmqExchange | quote }}
            - name: RABBITMQ_EXCHANGE_TYPE
              value: {{ .Values.config.rabbitmqExchangeType | quote }}
            - name: RABBITMQ_QUEUE
              value: {{ .Values.config.rabbitmqQueue | quote }}
            - name: KWEAVER_BASE_URL
              value: {{ .Values.config.kweaverBaseUrl | quote }}
            - name: KWEAVER_DECISION_AGENT_ID
              value: {{ .Values.config.kweaverDecisionAgentId | quote }}
            - name: KWEAVER_BUSINESS_DOMAIN
              value: {{ .Values.config.kweaverBusinessDomain | quote }}
            - name: KWEAVER_TIMEOUT
              value: {{ .Values.config.kweaverTimeout | quote }}
            - name: KWEAVER_TLS_INSECURE
              value: {{ .Values.config.kweaverTlsInsecure | quote }}
            - name: KWEAVER_PROBE_ON_STARTUP
              value: {{ .Values.config.kweaverProbeOnStartup | quote }}
            - name: FOUNDATION_ENDPOINT
              value: {{ .Values.config.foundationEndpoint | quote }}
            - name: CORE_AGENT_LOG_LEVEL
              value: {{ .Values.config.coreAgentLogLevel | quote }}
            - name: CORE_AGENT_LOG_TO_STDOUT
              value: {{ .Values.config.coreAgentLogToStdout | quote }}
            - name: CORE_AGENT_LOG_FILE
              value: {{ .Values.config.coreAgentLogFile | quote }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
{{- if or .Values.envFile.enabled .Values.kweaverHostMount.enabled }}
          volumeMounts:
{{- if .Values.envFile.enabled }}
            - name: env-file
              mountPath: {{ .Values.envFile.mountPath | quote }}
              subPath: .env
{{- end }}
{{- if .Values.kweaverHostMount.enabled }}
            - name: kweaver-home
              mountPath: {{ .Values.kweaverHostMount.mountPath | quote }}
{{- end }}
{{- end }}
{{- if or .Values.envFile.enabled .Values.kweaverHostMount.enabled }}
      volumes:
{{- if .Values.envFile.enabled }}
        - name: env-file
          configMap:
            name: {{ include "core-agent-service.fullname" . }}-env-file
{{- end }}
{{- if .Values.kweaverHostMount.enabled }}
        - name: kweaver-home
          hostPath:
            path: {{ .Values.kweaverHostMount.hostPath | quote }}
            type: DirectoryOrCreate
{{- end }}
{{- end }}
