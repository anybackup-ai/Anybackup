replicaCount: 1

image:
  repository: core-agent-service
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  # 当前服务通过 RabbitMQ 与外部系统交互，默认不对外暴露 Service。
  enabled: false
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  # 当前服务不是 HTTP 入口，默认不创建 Ingress。
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: core-agent-service.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

config:
  rabbitmqExchange: ""
  rabbitmqExchangeType: direct
  rabbitmqQueue: ""
  kweaverBaseUrl: ""
  kweaverDecisionAgentId: ""
  kweaverBusinessDomain: ""
  kweaverTimeout: 30
  kweaverTlsInsecure: true
  kweaverProbeOnStartup: true
  foundationEndpoint: ""
  coreAgentLogLevel: INFO
  coreAgentLogToStdout: true
  # 为空时表示禁用文件日志，仅按 coreAgentLogToStdout 输出。
  coreAgentLogFile: ""

secrets:
  create: false
  name: core-agent-service-secrets
  databaseUrlKey: database-url
  rabbitmqUrlKey: rabbitmq-url
  kweaverUsernameKey: kweaver-username
  kweaverPasswordKey: kweaver-password
  kweaverTokenKey: kweaver-token
  foundationAkKey: foundation-ak
  foundationSkKey: foundation-sk
  databaseUrl: ""
  rabbitmqUrl: ""
  kweaverUsername: ""
  kweaverPassword: ""
  kweaverToken: ""
  foundationAk: ""
  foundationSk: ""

envFile:
  enabled: false
  # 这是容器内的 .env 文件路径，不是目录路径。
  mountPath: /app/.env
  # 仅在 enabled=true 时写入额外 ConfigMap 并挂载为 .env 文件；为空时会得到空文件。
  content: ""

kweaverHostMount:
  enabled: false
  # 这里必须填写 Kubernetes 节点上的实际绝对路径，`~` 不会在 hostPath 中自动展开。
  hostPath: /root/.kweaver
  # 仅在没有显式用户名密码、且需要复用节点本地 ConfigAuth 登录态时才需要挂载该目录。
  mountPath: /root/.kweaver
