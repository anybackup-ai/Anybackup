replicaCount: 1

image:
  registry: docker.aityp.com
  repository: image/docker.io/anybackup/conversation-service
  tag: 0.1.0
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

command:
  - uvicorn
args:
  - app.main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

config:
  serviceName: conversation_service
  serviceVersion: 0.1.0
  apiPrefix: /api/conversation_service/v1
  rabbitmqExchange: conversation.agent.events
  coreAgentStatusQueue: conversation.core_agent.status.v1
  coreAgentStatusPrefetchCount: 10
  decisionAgentAgUiQueue: conversation.decision_agent.ag_ui
  decisionAgentAgUiPrefetchCount: 10
  backgroundWorkersEnabled: true
  outboxPollIntervalMs: 1000
  outboxBatchSize: 100
  outboxMaxAttempts: 5
  outboxRetryDelayMs: 1000
  outboxLockTtlMs: 30000
  retentionLockTtlMs: 30000
  retentionAutoArchiveAfterDays: 30
  retentionArchiveRetentionDays: 365
  retentionBatchSize: 100
  snowflakeNodeId: 1
  snowflakeEpochMs: "1735689600000"
  authContextSource: api_gateway_x_user
  authUserHeaderName: X-User
  coreAgentServiceName: core_agent_service
  logLevel: INFO
  logFormat: json
  errorCatalogSource: local
  messageCatalogSource: local

secrets:
  create: false
  name: conversation-service-secrets
  databaseUrlKey: database-url
  rabbitmqUrlKey: rabbitmq-url
  redisUrlKey: redis-url
  coreAgentServiceTokenKey: core-agent-service-token
  databaseUrl: ""
  rabbitmqUrl: ""
  redisUrl: ""
  coreAgentServiceToken: ""

extraEnv: []
extraEnvFrom: []

service:
  type: ClusterIP
  port: 80
  targetPort: http
  annotations: {}

ingressRoute:
  enabled: true
  ingressClass: traefik
  pathPrefix: /api/conversation_service/v1
  priority: 10
  middlewares:
    - name: api-gateway-service-api-gateway-service-auth
      namespace: anybackup-ai

migrations:
  enabled: true
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

containerPort: 8000

probes:
  startup:
    enabled: true
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 30
  readiness:
    enabled: true
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 12
  liveness:
    enabled: true
    path: /healthz
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 6

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}

revisionHistoryLimit: 3
