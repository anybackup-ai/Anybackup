apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "conversation-service.fullname" . }}
  labels:
    {{- include "conversation-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "conversation-service.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: conversation-service
  template:
    metadata:
      labels:
        {{- include "conversation-service.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: conversation-service
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.podAnnotations .Values.secrets.create }}
      annotations:
        {{- if .Values.secrets.create }}
        checksum/conversation-secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: conversation-service
          image: {{ include "conversation-service.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: {{ .Values.config.serviceName | quote }}
            - name: SERVICE_VERSION
              value: {{ .Values.config.serviceVersion | quote }}
            - name: API_PREFIX
              value: {{ .Values.config.apiPrefix | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "conversation-service.secretName" . }}
                  key: {{ .Values.secrets.databaseUrlKey }}
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "conversation-service.secretName" . }}
                  key: {{ .Values.secrets.rabbitmqUrlKey }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "conversation-service.secretName" . }}
                  key: {{ .Values.secrets.redisUrlKey }}
            - name: RABBITMQ_EXCHANGE
              value: {{ .Values.config.rabbitmqExchange | quote }}
            - name: CORE_AGENT_STATUS_QUEUE
              value: {{ .Values.config.coreAgentStatusQueue | quote }}
            - name: CORE_AGENT_STATUS_PREFETCH_COUNT
              value: {{ .Values.config.coreAgentStatusPrefetchCount | quote }}
            - name: DECISION_AGENT_AG_UI_QUEUE
              value: {{ .Values.config.decisionAgentAgUiQueue | quote }}
            - name: DECISION_AGENT_AG_UI_PREFETCH_COUNT
              value: {{ .Values.config.decisionAgentAgUiPrefetchCount | quote }}
            - name: BACKGROUND_WORKERS_ENABLED
              value: {{ .Values.config.backgroundWorkersEnabled | quote }}
            - name: OUTBOX_POLL_INTERVAL_MS
              value: {{ .Values.config.outboxPollIntervalMs | quote }}
            - name: OUTBOX_BATCH_SIZE
              value: {{ .Values.config.outboxBatchSize | quote }}
            - name: OUTBOX_MAX_ATTEMPTS
              value: {{ .Values.config.outboxMaxAttempts | quote }}
            - name: OUTBOX_RETRY_DELAY_MS
              value: {{ .Values.config.outboxRetryDelayMs | quote }}
            - name: OUTBOX_LOCK_TTL_MS
              value: {{ .Values.config.outboxLockTtlMs | quote }}
            - name: RETENTION_LOCK_TTL_MS
              value: {{ .Values.config.retentionLockTtlMs | quote }}
            - name: RETENTION_AUTO_ARCHIVE_AFTER_DAYS
              value: {{ .Values.config.retentionAutoArchiveAfterDays | quote }}
            - name: RETENTION_ARCHIVE_RETENTION_DAYS
              value: {{ .Values.config.retentionArchiveRetentionDays | quote }}
            - name: RETENTION_BATCH_SIZE
              value: {{ .Values.config.retentionBatchSize | quote }}
            - name: SNOWFLAKE_NODE_ID
              value: {{ .Values.config.snowflakeNodeId | quote }}
            - name: SNOWFLAKE_EPOCH_MS
              value: {{ .Values.config.snowflakeEpochMs | quote }}
            - name: AUTH_CONTEXT_SOURCE
              value: {{ .Values.config.authContextSource | quote }}
            - name: AUTH_USER_HEADER_NAME
              value: {{ .Values.config.authUserHeaderName | quote }}
            - name: CORE_AGENT_SERVICE_NAME
              value: {{ .Values.config.coreAgentServiceName | quote }}
            - name: CORE_AGENT_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "conversation-service.secretName" . }}
                  key: {{ .Values.secrets.coreAgentServiceTokenKey }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.config.logFormat | quote }}
            - name: ERROR_CATALOG_SOURCE
              value: {{ .Values.config.errorCatalogSource | quote }}
            - name: MESSAGE_CATALOG_SOURCE
              value: {{ .Values.config.messageCatalogSource | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
